<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひまわり店長専用 | 管理パネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0c0a09; color: #e7e5e4; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">

    <!-- Auth Guard -->
    <div id="auth-screen" class="fixed inset-0 bg-stone-950 z-[100] flex flex-col items-center justify-center p-6">
        <div class="bg-stone-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-stone-800">
            <div class="flex flex-col items-center gap-4 mb-8">
                <div class="bg-orange-600 p-4 rounded-2xl shadow-xl shadow-orange-900/20">
                    <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase italic">Himawari Admin</h1>
            </div>
            <input type="password" id="pass-input" placeholder="PASSCODE" class="w-full p-4 bg-stone-950 rounded-2xl mb-4 text-center font-bold outline-none border border-stone-800 focus:border-orange-600 transition-all tracking-widest text-xl">
            <button id="login-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg">AUTHENTICATE</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <header class="sticky top-0 z-40 bg-stone-950/80 backdrop-blur-md border-b border-stone-800">
            <div class="max-w-4xl mx-auto px-6 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-orange-600 p-1.5 rounded-lg">
                        <i data-lucide="sun" class="text-white w-5 h-5"></i>
                    </div>
                    <h1 class="font-black text-lg italic">DASHBOARD</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="csv-btn" class="bg-stone-800 hover:bg-stone-700 p-3 rounded-xl transition">
                        <i data-lucide="download" class="w-5 h-5"></i>
                    </button>
                    <button id="logout-btn" class="bg-stone-900 text-stone-500 p-3 rounded-xl hover:text-white transition">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-6 space-y-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-stone-900 p-6 rounded-3xl border border-stone-800">
                    <p class="text-[10px] font-black text-stone-500 uppercase tracking-widest mb-1">Today's Orders</p>
                    <p id="today-count" class="text-4xl font-black text-orange-500">0</p>
                </div>
                <div class="bg-stone-900 p-6 rounded-3xl border border-stone-800">
                    <p class="text-[10px] font-black text-stone-500 uppercase tracking-widest mb-1">Total Records</p>
                    <p id="all-count" class="text-4xl font-black text-orange-500">0</p>
                </div>
                <div class="bg-stone-900 p-6 rounded-3xl border border-stone-800 flex items-end justify-between">
                    <div>
                        <p class="text-[10px] font-black text-stone-500 uppercase tracking-widest mb-1">Server Status</p>
                        <p class="text-sm font-bold text-green-500 flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> ONLINE
                        </p>
                    </div>
                    <i data-lucide="activity" class="text-stone-700 w-8 h-8"></i>
                </div>
            </div>

            <!-- Inventory Manager -->
            <section class="bg-stone-900 rounded-3xl border border-stone-800 overflow-hidden">
                <div class="p-6 border-b border-stone-800 flex justify-between items-center">
                    <h3 class="text-xs font-black uppercase tracking-widest text-stone-400">Inventory Status</h3>
                    <span class="text-[10px] bg-stone-800 px-2 py-1 rounded-full text-stone-500">Tap to toggle SOLD OUT</span>
                </div>
                <div id="inventory-grid" class="p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                    <!-- Dynamic -->
                </div>
            </section>

            <!-- Order List -->
            <section class="space-y-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-stone-400 ml-2">Recent Reservations</h3>
                <div id="reservations-list" class="space-y-4">
                    <!-- Dynamic -->
                </div>
            </section>
        </main>
    </div>

    <div id="notification-container" class="fixed bottom-6 right-6 z-[60] flex flex-col gap-2 w-72"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'himawari-yakitori-v1';

        const MENU = [
            { id: 'm1', name: 'ねぎま' }, { id: 'm2', name: '焼き鳥' }, { id: 'm3', name: '手羽中' },
            { id: 'm4', name: '鳥軟骨' }, { id: 'm5', name: '豚レバー' }, { id: 'm6', name: 'カシラ' },
            { id: 'm7', name: '豚タン' }, { id: 'm8', name: '豚白モツ' }, { id: 'm9', name: '鶏皮' },
            { id: 'm10', name: 'つくね' }, { id: 'm11', name: 'むねニンニク' }
        ];

        let soldOutItems = {};
        let reservations = [];
        let firstLoad = true;

        window.onload = async () => {
            lucide.createIcons();
            
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();

            document.getElementById('login-btn').onclick = () => {
                if(document.getElementById('pass-input').value === '7777') {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    startAdminSync();
                } else {
                    alert("パスコードが違います");
                }
            };
        };

        function startAdminSync() {
            // Inventory
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), (snap) => {
                soldOutItems = snap.exists() ? snap.data().soldOut : {};
                renderInventory();
            });

            // Reservations
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), (snap) => {
                const newRes = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                if (!firstLoad && newRes.length > reservations.length) {
                    showNotify("新規注文を受け付けました！");
                }
                reservations = newRes;
                renderReservations();
                updateStats();
                firstLoad = false;
            });
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = MENU.map(item => `
                <button onclick="window.toggleStock('${item.id}')" class="p-4 rounded-2xl border font-black text-xs transition-all flex flex-col items-center gap-2 ${soldOutItems[item.id] ? 'bg-red-900/20 border-red-800 text-red-500 shadow-lg shadow-red-950/20' : 'bg-stone-800 border-stone-700 text-stone-400'}">
                    <span>${item.name}</span>
                    <span class="text-[8px] px-2 py-0.5 rounded-full ${soldOutItems[item.id] ? 'bg-red-800' : 'bg-stone-700'}">${soldOutItems[item.id] ? '売切' : '販売中'}</span>
                </button>
            `).join('');
        }

        window.toggleStock = async (id) => {
            const newSold = { ...soldOutItems, [id]: !soldOutItems[id] };
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), { soldOut: newSold });
        };

        function renderReservations() {
            const list = document.getElementById('reservations-list');
            list.innerHTML = reservations.map(res => {
                const isToday = res.date === new Date().toISOString().split('T')[0];
                return `
                <div class="bg-stone-900 border ${isToday ? 'border-orange-800 shadow-lg shadow-orange-950/10' : 'border-stone-800'} rounded-3xl p-6 space-y-4">
                    <div class="flex justify-between items-start">
                        <div class="space-y-1">
                            <span class="text-[9px] font-black bg-stone-800 text-stone-400 px-2 py-1 rounded italic uppercase">${res.date} 受取</span>
                            <h4 class="text-xl font-black">${res.name} 様</h4>
                            <a href="tel:${res.phone}" class="text-xs text-orange-600 font-bold block">${res.phone}</a>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-stone-500 uppercase block mb-1">${res.location}</span>
                            <p class="text-2xl font-black text-white">¥${res.total.toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1 text-[11px] font-bold text-stone-400 border-t border-stone-800 pt-4">
                        ${Object.entries(res.items).map(([k,v]) => {
                            const [id, f] = k.split('-');
                            return `<div class="flex justify-between border-b border-stone-800/50 pb-1"><span>${MENU.find(m=>m.id===id)?.name || id}(${f})</span><span>${v}本</span></div>`;
                        }).join('')}
                    </div>
                    ${res.notes ? `<div class="bg-orange-950/20 p-3 rounded-xl text-[10px] text-orange-200 font-medium italic border border-orange-900/30">備考: ${res.notes}</div>` : ''}
                </div>
            `;}).join('');
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('today-count').innerText = reservations.filter(r => r.date === today).length;
            document.getElementById('all-count').innerText = reservations.length;
        }

        document.getElementById('csv-btn').onclick = () => {
            const content = "受取日,名前,電話,合計,場所,内容,備考\n" + reservations.map(r => `"${r.date}","${r.name}","${r.phone}","${r.total}","${r.location}","${Object.entries(r.items).map(([k,v])=>`${k}x${v}`).join('/')}","${r.notes || ''}"`).join("\n");
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), content], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'himawari_orders.csv'; a.click();
        };

        document.getElementById('logout-btn').onclick = () => location.reload();

        function showNotify(msg) {
            const el = document.createElement('div');
            el.className = "bg-orange-600 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-3 font-black text-xs animate-bounce border border-white/20";
            el.innerHTML = `<i data-lucide="bell"></i> <span>${msg}</span>`;
            document.getElementById('notification-container').appendChild(el);
            lucide.createIcons();
            setTimeout(() => el.remove(), 5000);
        }
    </script>
</body>
</html>
