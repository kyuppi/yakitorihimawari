<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やきとり ひまわり | ネット予約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK (Compatibility version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #fcfbf8; }
        .loading-spinner { border: 3px solid rgba(234, 88, 12, 0.1); border-left-color: #ea580c; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .order-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .order-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="text-stone-800 pb-32">

    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loading-spinner mb-4"></div>
        <p id="loading-status" class="text-[10px] font-black text-orange-600 tracking-[0.2em] uppercase text-center leading-relaxed px-6">
            システム起動中...<br>
            <span class="text-stone-400 font-normal mt-2 lowercase tracking-normal italic">Connecting to yakitori-81aab</span>
        </p>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-stone-200">
        <div class="max-w-xl mx-auto px-5 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div class="bg-orange-600 p-1.5 rounded-xl shadow-lg shadow-orange-200">
                    <i data-lucide="sun" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-base font-black text-stone-900 leading-none">ひまわり</h1>
                    <p class="text-[8px] font-bold text-stone-400 mt-0.5 uppercase tracking-widest">Mobile Yakitori Order</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="connection-badge" class="text-[10px] font-black px-2 py-1 bg-stone-100 text-stone-400 rounded-md flex items-center gap-1 transition-colors">
                    <i data-lucide="database" class="w-3 h-3"></i> 待機中
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">
        <form id="order-form" class="space-y-6">
            <!-- Step 01: Customer Info -->
            <div class="bg-white rounded-[2rem] shadow-sm border border-stone-200 p-6 space-y-5 order-card">
                <div class="flex items-center gap-3 border-b border-stone-100 pb-4">
                    <span class="bg-stone-900 text-white w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-black italic italic">01</span>
                    <h3 class="font-black text-sm text-stone-900">お客様情報と受取日</h3>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-stone-400 uppercase mb-1.5 ml-1">受取希望日を選択</label>
                        <input type="date" id="order-date" required class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-100 font-bold outline-none text-sm transition-all focus:ring-2 focus:ring-orange-500 focus:bg-white">
                        <div id="location-badge" class="mt-2.5 hidden p-3 rounded-2xl text-[11px] font-bold flex items-center gap-2 border transition-all">
                            <i data-lucide="map-pin" class="w-4 h-4"></i> <span id="location-text"></span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <input type="text" id="order-name" required placeholder="お名前" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-100 font-bold outline-none text-sm focus:ring-2 focus:ring-orange-500 focus:bg-white">
                        <input type="tel" id="order-phone" required placeholder="電話番号" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-100 font-bold outline-none text-sm focus:ring-2 focus:ring-orange-500 focus:bg-white">
                    </div>

                    <textarea id="order-notes" placeholder="備考（例：18時頃伺います / 塩少なめなど）" class="w-full p-4 bg-stone-50 rounded-2xl border border-stone-100 font-bold outline-none text-sm h-24 resize-none focus:ring-2 focus:ring-orange-500 focus:bg-white"></textarea>
                </div>
            </div>

            <!-- Step 02: Menu Selection -->
            <div class="bg-white rounded-[2rem] shadow-sm border border-stone-200 p-6 space-y-5 order-card">
                <div class="flex items-center justify-between border-b border-stone-100 pb-4">
                    <div class="flex items-center gap-3">
                        <span class="bg-stone-900 text-white w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-black italic italic">02</span>
                        <h3 class="font-black text-sm text-stone-900 italic">MENU</h3>
                    </div>
                    <span class="text-[10px] text-stone-400 font-bold uppercase tracking-widest italic">Price incl. Tax</span>
                </div>
                <div id="menu-container" class="grid gap-3">
                    <!-- Dynamic Items -->
                </div>
            </div>

            <!-- Floating Footer Summary -->
            <div class="fixed bottom-6 left-4 right-4 z-50">
                <div class="max-w-xl mx-auto bg-stone-900/90 text-white p-3.5 rounded-[2.5rem] shadow-2xl flex items-center gap-4 border border-white/10 backdrop-blur-lg">
                    <div class="pl-4 leading-tight shrink-0">
                        <p class="text-[9px] font-black text-stone-500 uppercase tracking-widest mb-0.5">Total Amount</p>
                        <p class="text-2xl font-black text-orange-500 italic">¥<span id="total-price" class="not-italic">0</span></p>
                    </div>
                    <button type="submit" id="submit-btn" disabled class="flex-1 bg-orange-600 hover:bg-orange-500 disabled:bg-stone-800 disabled:text-stone-600 text-white font-black py-4 rounded-3xl transition-all flex items-center justify-center gap-2 text-sm shadow-lg active:scale-95 shadow-orange-900/20">
                        <span>予約を確定する</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </form>
    </main>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-6 transition-all">
        <div class="bg-white rounded-[3rem] p-8 max-w-sm w-full text-center space-y-6 shadow-2xl animate-in zoom-in-95 duration-300">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="check-circle-2" class="w-10 h-10"></i>
            </div>
            <div class="space-y-2">
                <h2 class="text-2xl font-black text-stone-900">予約完了！</h2>
                <p class="text-sm text-stone-500 font-medium leading-relaxed">
                    ご注文ありがとうございます。<br>
                    受取日に店頭でお待ちしております！
                </p>
            </div>
            <button onclick="closeModal()" class="w-full py-4 bg-stone-900 text-white rounded-2xl font-black text-sm tracking-widest hover:bg-stone-800 transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFHd2b0KlHvpgMi-oax7llhNaQV-yiLq8",
            authDomain: "yakitori-81aab.firebaseapp.com",
            projectId: "yakitori-81aab",
            storageBucket: "yakitori-81aab.firebasestorage.app",
            messagingSenderId: "765393606286",
            appId: "1:765393606286:web:755c313fbed6e8ea42dbdf"
        };

        const appId = "yakitori-himawari-main";

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MENU = [
            { id: 'm1', name: 'ねぎま', price: 140 }, { id: 'm2', name: '焼き鳥', price: 140 },
            { id: 'm3', name: '手羽中', price: 140 }, { id: 'm4', name: '鳥軟骨', price: 140 },
            { id: 'm5', name: '豚レバー', price: 140 }, { id: 'm6', name: 'カシラ', price: 140 },
            { id: 'm7', name: '豚タン', price: 140 }, { id: 'm8', name: '豚白モツ', price: 120 },
            { id: 'm9', name: '鶏皮', price: 120 }, { id: 'm10', name: 'つくね', price: 120 },
            { id: 'm11', name: 'むねニンニク', price: 120 },
        ];
        const FLAVORS = ['タレ', '塩', '無'];
        const SCHEDULE = { 0: 'ジョイフーズ 藪塚店', 4: 'ジョイフーズ 藪塚店', 5: 'アバンセ 玉村店', 6: 'アバンセ 粕川店' };

        let cart = {};
        let soldOutItems = {};

        async function initApp() {
            lucide.createIcons();
            
            try {
                // 匿名認証
                await auth.signInAnonymously().catch(e => console.warn("Auth check needed"));

                const badge = document.getElementById('connection-badge');
                const inventoryRef = db.doc(`artifacts/${appId}/public/data/inventory/status`);
                
                // Firestore監視
                inventoryRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        soldOutItems = doc.data().soldOut || {};
                    }
                    badge.classList.remove('bg-stone-100', 'text-stone-400');
                    badge.classList.add('bg-green-100', 'text-green-700');
                    badge.innerHTML = `<i data-lucide="database" class="w-3 h-3"></i> 接続済み`;
                    lucide.createIcons();
                    
                    renderMenu();
                    hideLoading();
                }, (err) => {
                    console.error("Connection error details:", err);
                    
                    if (err.message.includes("does not exist")) {
                        document.getElementById('loading-status').innerHTML = 
                            "<span class='text-red-500 font-bold'>データベースが未作成です</span><br>" +
                            "<span class='text-[8px] text-stone-500 lowercase'>FirebaseコンソールでFirestore Databaseを作成してください。</span>";
                    } else {
                        badge.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i> オフライン`;
                        hideLoading(); // 接続できなくてもメニューは出す
                    }
                    renderMenu();
                });

            } catch (err) {
                console.error("Critical Init Error:", err);
                renderMenu();
                hideLoading();
            }
        }

        window.onload = initApp;

        function hideLoading() {
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.style.opacity = '0';
                setTimeout(() => screen.classList.add('hidden'), 500);
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            if (!container) return;
            
            container.innerHTML = MENU.map(item => {
                const isSoldOut = soldOutItems[item.id];
                return `
                <div class="relative bg-white border border-stone-100 rounded-[1.5rem] p-4 shadow-sm hover:shadow-md transition-all ${isSoldOut ? 'opacity-40 pointer-events-none grayscale' : ''}">
                    <div class="flex items-center justify-between mb-3 px-1">
                        <span class="font-black text-stone-900 tracking-tight">${item.name}</span>
                        <span class="text-[10px] font-black text-orange-600 bg-orange-50 px-2 py-1 rounded-lg italic tracking-wider">¥${item.price}</span>
                    </div>
                    <div class="flex items-center gap-2 overflow-x-auto hide-scrollbar pb-1">
                        ${FLAVORS.map(f => {
                            const key = `${item.id}-${f}`;
                            const count = cart[key] || 0;
                            return `
                                <div class="flex-1 min-w-[85px] bg-stone-50 p-2 rounded-2xl border border-stone-100 flex flex-col items-center gap-1.5 transition-all ${count > 0 ? 'bg-orange-50/50 border-orange-200' : ''}">
                                    <span class="text-[9px] font-black ${count > 0 ? 'text-orange-600' : 'text-stone-400'} uppercase">${f}</span>
                                    <div class="flex items-center justify-between w-full gap-1">
                                        <button type="button" onclick="updateQty('${item.id}','${f}',-1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-xl text-stone-400 border border-stone-100 active:scale-90">-</button>
                                        <span class="text-[13px] font-black ${count > 0 ? 'text-stone-900' : 'text-stone-400'}">${count}</span>
                                        <button type="button" onclick="updateQty('${item.id}','${f}',1)" class="w-8 h-8 flex items-center justify-center bg-white rounded-xl text-orange-600 border border-orange-100 active:scale-90 shadow-sm">+</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    ${isSoldOut ? `
                        <div class="absolute inset-0 flex items-center justify-center z-10">
                            <div class="bg-stone-900 text-white px-5 py-2 rounded-full text-[10px] font-black italic shadow-xl">本日売切れ</div>
                        </div>
                    ` : ''}
                </div>`;
            }).join('');
        }

        window.updateQty = (id, flavor, delta) => {
            const key = `${id}-${flavor}`;
            cart[key] = Math.max(0, (cart[key] || 0) + delta);
            if (cart[key] === 0) delete cart[key];
            updateSummary();
            renderMenu();
        };

        function updateSummary() {
            let total = 0;
            let qty = 0;
            Object.entries(cart).forEach(([k, v]) => {
                const item = MENU.find(m => m.id === k.split('-')[0]);
                total += (item?.price || 0) * v;
                qty += v;
            });
            document.getElementById('total-price').innerText = total.toLocaleString();
            
            const dateVal = document.getElementById('order-date').value;
            const loc = dateVal ? SCHEDULE[new Date(dateVal).getDay()] : null;
            document.getElementById('submit-btn').disabled = qty === 0 || !loc;
        }

        document.getElementById('order-date').onchange = (e) => {
            const dateStr = e.target.value;
            if (!dateStr) return;
            const date = new Date(dateStr);
            const loc = SCHEDULE[date.getDay()];
            const badge = document.getElementById('location-badge');
            badge.classList.remove('hidden');
            if (loc) {
                document.getElementById('location-text').innerText = `受取場所: ${loc}`;
                badge.className = "mt-2.5 p-3 rounded-2xl text-[11px] font-bold flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-100";
            } else {
                document.getElementById('location-text').innerText = '本日は定休日です';
                badge.className = "mt-2.5 p-3 rounded-2xl text-[11px] font-bold flex items-center gap-2 bg-red-50 text-red-700 border border-red-100";
            }
            updateSummary();
        };

        function closeModal() {
            document.getElementById('success-modal').classList.add('hidden');
            document.getElementById('success-modal').classList.remove('flex');
        }

        document.getElementById('order-form').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            const dateStr = document.getElementById('order-date').value;
            const loc = SCHEDULE[new Date(dateStr).getDay()];

            if (!loc) return alert('営業日を選択してください。');

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 送信中...`;
            lucide.createIcons();

            const orderData = {
                name: document.getElementById('order-name').value,
                phone: document.getElementById('order-phone').value,
                notes: document.getElementById('order-notes').value,
                date: dateStr,
                location: loc,
                items: cart,
                total: parseInt(document.getElementById('total-price').innerText.replace(/,/g,'')),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection(`artifacts/${appId}/public/data/reservations`).add(orderData);
                const modal = document.getElementById('success-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                cart = {};
                document.getElementById('order-form').reset();
                document.getElementById('location-badge').classList.add('hidden');
                updateSummary();
                renderMenu();
            } catch (err) {
                console.error("Order Submit Error:", err);
                alert('注文を送信できませんでした。データベース(default)が作成されているか確認してください。');
            } finally {
                submitBtn.innerHTML = `<span>予約を確定する</span><i data-lucide="send" class="w-4 h-4"></i>`;
                lucide.createIcons();
                updateSummary();
            }
        };
    </script>
</body>
</html>
